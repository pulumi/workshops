---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jupyterhub
  namespace: jupyterhub
spec:
  interval: 10m
  timeout: 10m
  chart:
    spec:
      chart: jupyterhub
      version: "4.3.2"
      sourceRef:
        kind: HelmRepository
        name: jupyterhub
  values:
    global:
      imageRegistry: docker.io
    proxy:
      service:
        type: LoadBalancer
        annotations:
          service.beta.kubernetes.io/aws-load-balancer-type: "external"
          service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: "ip"
          service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
    singleuser:
      defaultUrl: "/lab"
    prePuller:
      hook:
        enabled: false
      continuous:
        enabled: false
    scheduling:
      userScheduler:
        enabled: false
