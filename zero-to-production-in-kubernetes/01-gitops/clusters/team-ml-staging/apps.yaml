---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  dependsOn:
    - name: infrastructure
  interval: 10m
  retryInterval: 2m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./zero-to-production-in-kubernetes/01-gitops/apps/ml-staging
  prune: true
  wait: true
  postBuild:
    substitute:
      cluster_name: team-ml-staging
      cluster_env: staging
